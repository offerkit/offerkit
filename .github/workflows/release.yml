name: Release

# Manual-only. Trigger from the Actions tab → "Release" → Run workflow.
# Order of operations:
#   1. pnpm version-packages — consumes pending .changeset/*.md files,
#      bumps versions in the relevant package.json files, writes
#      CHANGELOG.md entries, deletes the consumed changesets.
#      All in the runner's working tree only; nothing pushed yet.
#   2. Build @offerkit/sdk, @offerkit/cli, @offerkit/mcp from the bumped
#      working tree.
#   3. `changeset publish` — push the new versions to npm.
#   4. Only if publish succeeded: commit the version bumps + consumed
#      changesets as github-actions[bot] and push to main.
#
# Failure semantics: if build or publish fails, no commit hits main.
# The pending changesets stay on main intact, and the next run will
# re-attempt cleanly. (changeset publish itself is safe to re-run —
# it skips versions already on npm.)
#
# If there are no pending changesets, all release-specific steps short-
# circuit and the workflow exits clean.
#
# Requires the repo secret NPM_TOKEN (npm automation token with publish
# rights on @offerkit). Set at Settings → Secrets and variables →
# Actions → New repository secret.

on:
  workflow_dispatch:

permissions:
  contents: write  # for pushing the post-publish version-bump commit
  id-token: write  # for npm provenance / future trusted-publishing

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.23.0

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Apply pending changesets
        id: version
        run: |
          pnpm version-packages
          if git diff --quiet; then
            echo "No pending changesets — nothing to release."
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Build public packages
        if: steps.version.outputs.changed == 'true'
        run: pnpm turbo run build --filter=@offerkit/sdk --filter=@offerkit/cli --filter=@offerkit/mcp

      - name: Publish to npm
        if: steps.version.outputs.changed == 'true'
        run: pnpm changeset publish
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          # changeset publish uses npm under the hood; npm reads
          # NODE_AUTH_TOKEN when registry-url is set above.
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Commit + push version bumps
        if: steps.version.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "chore: release"
          git push origin HEAD:main
