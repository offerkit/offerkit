name: Release Image

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Semver image version to release"
        required: true
        default: "0.1.0"
      ref:
        description: "Git ref to tag"
        required: true
        default: main

permissions:
  contents: write
  packages: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release-image:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref }}
          fetch-depth: 0

      - name: Create release tag
        id: release
        shell: bash
        run: |
          version="${{ inputs.version }}"
          if [[ ! "${version}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Version must be plain semver, for example 0.1.0."
            exit 1
          fi

          tag="v${version}"
          if git ls-remote --exit-code --tags origin "refs/tags/${tag}" >/dev/null 2>&1; then
            git fetch --force origin "refs/tags/${tag}:refs/tags/${tag}"
            existing_sha="$(git rev-list -n 1 "${tag}")"
            current_sha="$(git rev-parse HEAD)"
            if [[ "${existing_sha}" != "${current_sha}" ]]; then
              echo "Tag ${tag} already exists at ${existing_sha}, not ${current_sha}."
              exit 1
            fi
            echo "Tag ${tag} already exists at this commit; publishing image again."
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git tag -a "${tag}" -m "Release ${tag}"
            git push origin "${tag}"
          fi

          image="ghcr.io/offerkit/offerkit"
          short_sha="$(git rev-parse --short=12 HEAD)"
          {
            echo "tags<<EOF"
            echo "${image}:sha-${short_sha}"
            echo "${image}:${tag}"
            echo "${image}:${version}"
            echo "${image}:latest"
            echo "EOF"
            echo "revision=$(git rev-parse HEAD)"
          } >> "${GITHUB_OUTPUT}"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and publish release image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.release.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          labels: |
            org.opencontainers.image.title=OfferKit
            org.opencontainers.image.description=Self-hostable promotion engine runtime
            org.opencontainers.image.source=https://github.com/offerkit/offerkit
            org.opencontainers.image.revision=${{ steps.release.outputs.revision }}
