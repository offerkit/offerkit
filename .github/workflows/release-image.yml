name: Release Image

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Semver image version to release"
        required: true
        default: "0.1.0"
      ref:
        description: "Git ref to tag"
        required: true
        default: main

permissions:
  contents: write
  packages: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release-image:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref }}
          fetch-depth: 0

      - name: Create release tag
        id: release
        shell: bash
        run: |
          version="${{ inputs.version }}"
          if [[ ! "${version}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Version must be plain semver, for example 0.1.0."
            exit 1
          fi

          tag="v${version}"
          if git ls-remote --exit-code --tags origin "refs/tags/${tag}" >/dev/null 2>&1; then
            git fetch --force origin "refs/tags/${tag}:refs/tags/${tag}"
            existing_sha="$(git rev-list -n 1 "${tag}")"
            current_sha="$(git rev-parse HEAD)"
            if [[ "${existing_sha}" != "${current_sha}" ]]; then
              echo "Tag ${tag} already exists at ${existing_sha}, not ${current_sha}."
              exit 1
            fi
            echo "Tag ${tag} already exists at this commit; publishing image again."
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git tag -a "${tag}" -m "Release ${tag}"
            git push origin "${tag}"
          fi

          image="ghcr.io/offerkit/offerkit"
          short_sha="$(git rev-parse --short=12 HEAD)"
          {
            echo "tags<<EOF"
            echo "${image}:sha-${short_sha}"
            echo "${image}:${tag}"
            echo "${image}:${version}"
            echo "${image}:latest"
            echo "EOF"
            echo "revision=$(git rev-parse HEAD)"
            echo "tag=${tag}"
            echo "version=${version}"
            echo "image=${image}"
          } >> "${GITHUB_OUTPUT}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and publish release image
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.release.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          labels: |
            org.opencontainers.image.title=OfferKit
            org.opencontainers.image.description=Self-hostable promotion engine runtime
            org.opencontainers.image.source=https://github.com/offerkit/offerkit
            org.opencontainers.image.revision=${{ steps.release.outputs.revision }}

      - name: Create GitHub image release
        env:
          GH_TOKEN: ${{ github.token }}
          IMAGE: ${{ steps.release.outputs.image }}
          VERSION: ${{ steps.release.outputs.version }}
          TAG: ${{ steps.release.outputs.tag }}
          REVISION: ${{ steps.release.outputs.revision }}
          DIGEST: ${{ steps.build.outputs.digest }}
        shell: bash
        run: |
          mkdir -p .release-notes

          previous_tag="$(git describe --tags --match 'v[0-9]*.[0-9]*.[0-9]*' --abbrev=0 "${TAG}^" 2>/dev/null || true)"
          if [[ -n "${previous_tag}" ]]; then
            range="${previous_tag}..HEAD"
            compare_url="https://github.com/offerkit/offerkit/compare/${previous_tag}...${TAG}"
          else
            range="HEAD"
            compare_url=""
          fi

          changelog="$(git log --no-merges --pretty=format:'- %s (%h)' "${range}")"
          if [[ -z "${changelog}" ]]; then
            changelog="- No source changes found since the previous stable image release."
          fi

          {
            echo "# OfferKit Image ${TAG}"
            echo
            echo "Published container image: \`${IMAGE}:${VERSION}\`"
            echo
            echo "## Pull"
            echo
            echo '```sh'
            echo "docker pull ${IMAGE}:${VERSION}"
            echo '```'
            echo
            echo "Also available as:"
            echo
            echo '```sh'
            echo "docker pull ${IMAGE}:${TAG}"
            echo "docker pull ${IMAGE}:latest"
            echo '```'
            echo
            echo "## Platforms"
            echo
            echo "- \`linux/amd64\`"
            echo
            echo "## Deployment Notes"
            echo
            echo "Use the explicit version tag in production:"
            echo
            echo '```yaml'
            echo "image: ${IMAGE}:${VERSION}"
            echo '```'
            echo
            echo "## Changelog"
            echo
            echo "${changelog}"
            echo
            echo "## Image Details"
            echo
            echo "- Source tag: \`${TAG}\`"
            echo "- Source revision: \`${REVISION}\`"
            if [[ -n "${DIGEST}" ]]; then
              echo "- Manifest digest: \`${DIGEST}\`"
            fi
            if [[ -n "${compare_url}" ]]; then
              echo "- Compare: ${compare_url}"
            fi
          } > .release-notes/image.md

          if gh release view "${TAG}" >/dev/null 2>&1; then
            gh release edit "${TAG}" \
              --title "OfferKit Image ${TAG}" \
              --notes-file .release-notes/image.md \
              --latest=true
          else
            gh release create "${TAG}" \
              --target "${REVISION}" \
              --title "OfferKit Image ${TAG}" \
              --notes-file .release-notes/image.md \
              --latest=true
          fi
