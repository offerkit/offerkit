name: Publish Image

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref to publish, for example main or v1.2.3"
        required: false
        default: main

permissions:
  contents: read
  packages: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ inputs.ref || github.ref }}

      - name: Compute image metadata
        id: image
        shell: bash
        run: |
          image="ghcr.io/offerkit/offerkit"
          short_sha="$(git rev-parse --short=12 HEAD)"
          tags="${image}:sha-${short_sha}"
          platforms="linux/amd64"

          ref_name="${GITHUB_REF_NAME}"
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            ref_name="${{ inputs.ref }}"
            ref_name="${ref_name#refs/heads/}"
            ref_name="${ref_name#refs/tags/}"
          fi

          if [[ "${GITHUB_EVENT_NAME}" == "push" && "${GITHUB_REF}" == "refs/heads/main" ]]; then
            tags="${tags}"$'\n'"${image}:edge"
          fi

          if [[ "${ref_name}" == v* ]]; then
            tags="${tags}"$'\n'"${image}:${ref_name}"$'\n'"${image}:latest"
            platforms="linux/amd64,linux/arm64"
          elif [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" && "${ref_name}" == "main" ]]; then
            tags="${tags}"$'\n'"${image}:edge"
          fi

          {
            echo "tags<<EOF"
            echo "${tags}"
            echo "EOF"
            echo "revision=$(git rev-parse HEAD)"
            echo "platforms=${platforms}"
          } >> "${GITHUB_OUTPUT}"

      - name: Set up QEMU
        if: contains(steps.image.outputs.platforms, 'linux/arm64')
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and publish image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: ${{ steps.image.outputs.platforms }}
          push: true
          tags: ${{ steps.image.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          labels: |
            org.opencontainers.image.title=OfferKit
            org.opencontainers.image.description=Self-hostable promotion engine runtime
            org.opencontainers.image.source=https://github.com/offerkit/offerkit
            org.opencontainers.image.revision=${{ steps.image.outputs.revision }}
