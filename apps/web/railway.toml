# Railway config for the web service.
# Service → Settings → Source → Config-as-Code Path → apps/web/railway.toml

[build]
builder = "DOCKERFILE"
dockerfilePath = "apps/web/Dockerfile"

[deploy]
startCommand = "node apps/web/server.js"
healthcheckPath = "/api/v1/ready"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5
