# Railway config for the worker service.
# Service → Settings → Source → Config-as-Code Path → apps/worker/railway.toml
#
# The worker doesn't need a public domain — remove it via
# Settings → Networking if Railway auto-generated one.

[build]
builder = "DOCKERFILE"
dockerfilePath = "apps/worker/Dockerfile"

[deploy]
startCommand = "pnpm --filter @offerkit/worker start"
healthcheckPath = "/health"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5
